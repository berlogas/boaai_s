services:
  ollama:
    image: ollama/ollama:latest
    container_name: berezhinskii-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: berezhinskii-api
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
      - OPENAI_API_KEY=ollama
      - DATA_PATH=/app/data
      - GLOBAL_INDEX_PATH=/app/global_index
      - UPLOADS_PATH=/app/uploads
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
      - LOG_LEVEL=INFO
    volumes:
      - ./data_volume:/app/data
      - ./data_volume/global_index:/app/global_index
      - ./data_volume/uploads:/app/uploads
      - ./backend/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: berezhinskii-ui
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      # Отключение всех внешних соединений и телеметрии
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_ENABLE_STATIC_SERVING=false
    volumes:
      - ./frontend/app:/app/app
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
    driver: local

networks:
  default:    
    name: berezhinskii_network
    driver: bridge
